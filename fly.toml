# Fly.io Configuration for MUMAA

primary_region = "sin"

[build]

[deploy]
  strategy = "rolling"

[[services]]
  internal_port = 3000
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.http_checks]
    interval = "30s"
    timeout = "10s"
    grace_period = "10s"
    method = "get"
    path = "/"

[[mounts]]
  source = "mumaa_data"
  destination = "/app/db"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
  swap_size_mb = 512

[experimental]
  auto_rollback = true
